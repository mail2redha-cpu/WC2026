<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FIFA WC 2026 — Panini Swaps</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0015;
  --glass:rgba(255,255,255,0.06);
  --glass-border:rgba(255,255,255,0.12);
  --c-purple:#a855f7;--c-pink:#ec4899;--c-gold:#f59e0b;--c-teal:#14b8a6;
  --c-blue:#3b82f6;--c-red:#ef4444;--c-green:#10b981;--c-orange:#f97316;
  --txt:#f1f5f9;--muted:#94a3b8;
  /* legacy aliases used across markup/JS */
  --sur:rgba(255,255,255,0.04);--card:rgba(255,255,255,0.06);--bdr:rgba(255,255,255,0.12);
  --gold:#f59e0b;--teal:#14b8a6;--red:#ef4444;--blue:#3b82f6;--green:#10b981;--purple:#a855f7;
  --bg-vignette:
    radial-gradient(1100px 700px at 0% 0%, rgba(168,85,247,0.28), transparent 60%),
    radial-gradient(1000px 800px at 100% 100%, rgba(20,184,166,0.22), transparent 60%),
    radial-gradient(900px 700px at 90% 0%, rgba(236,72,153,0.14), transparent 55%),
    radial-gradient(900px 800px at 10% 100%, rgba(59,130,246,0.14), transparent 55%);
  --header-bg:rgba(13,0,21,.72)
}
/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0f4ff;
  --glass:rgba(255,255,255,0.75);
  --glass-border:rgba(99,102,241,0.2);
  --txt:#1e1b4b;--muted:#64748b;
  --sur:rgba(255,255,255,0.6);--card:rgba(255,255,255,0.75);--bdr:rgba(99,102,241,0.2);
  --bg-vignette:
    radial-gradient(1100px 700px at 0% 0%, rgba(168,85,247,0.18), transparent 60%),
    radial-gradient(1000px 800px at 100% 100%, rgba(20,184,166,0.20), transparent 60%),
    radial-gradient(900px 700px at 90% 0%, rgba(236,72,153,0.10), transparent 55%),
    radial-gradient(900px 800px at 10% 100%, rgba(59,130,246,0.12), transparent 55%);
  --header-bg:rgba(240,244,255,.78)
}
html,body{min-height:100%}
body{
  background:var(--bg);
  background-image:var(--bg-vignette);
  background-attachment:fixed;
  color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  min-height:100vh;font-size:14px;overscroll-behavior:none;
  transition:background .4s ease,color .4s ease
}
.flag-icon,.fi{border-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.4)}

/* glass helper */
.glass{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:20px}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sp-title{text-align:center}
.sp-title h1{font-weight:900;font-size:clamp(26px,7vw,46px);letter-spacing:.04em;line-height:1.1;background:linear-gradient(90deg,#fff,#e9d5ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.sp-title h1 span{background:linear-gradient(90deg,var(--c-gold),var(--c-orange));-webkit-background-clip:text;background-clip:text;color:transparent}
.sp-title p{font-size:13px;color:var(--muted);margin-top:8px;letter-spacing:.08em}
.sp-sub{font-size:12px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase}
.sp-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:740px}
.sp-card{cursor:pointer;border-radius:22px;padding:22px 28px;text-align:center;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);transition:transform .22s,box-shadow .22s,border-color .22s;min-width:140px;flex:0 0 auto}
.sp-card:hover{transform:translateY(-5px);box-shadow:0 18px 40px rgba(168,85,247,.25);border-color:rgba(168,85,247,.5)}
.sp-card .av{font-size:38px;margin-bottom:8px}
.sp-card .pn{font-weight:900;font-size:19px;letter-spacing:.04em}
.sp-card .ps{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6}
.sp-add{cursor:pointer;border-radius:22px;padding:22px 28px;text-align:center;min-width:140px;flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:1.5px dashed rgba(168,85,247,.5);background:rgba(168,85,247,.08);color:#d8b4fe;font-weight:800;transition:transform .22s,background .22s}
.sp-add:hover{transform:translateY(-5px);background:rgba(168,85,247,.16)}
.sp-add .av{font-size:34px}
.sp-foot{font-size:11px;color:#64748b;text-align:center;max-width:360px}
.sp-foot a{color:var(--muted);text-decoration:underline}
.spinner{color:var(--muted);font-size:12px}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;min-height:100vh;animation:fadeIn .45s ease}
.app-header{position:sticky;top:0;z-index:99;background:var(--header-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--glass-border);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.logo{font-weight:900;font-size:15px;white-space:nowrap;line-height:1.15}
.logo span{background:linear-gradient(90deg,var(--c-gold),var(--c-orange));-webkit-background-clip:text;background-clip:text;color:transparent}
.logo small{display:block;font-size:9px;letter-spacing:.16em;color:var(--muted);font-weight:400;text-transform:uppercase}
.pbadge{padding:6px 14px;border-radius:999px;font-size:11px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;border:1px solid;background:rgba(255,255,255,.05)}
.gear-btn{padding:7px 11px;border-radius:999px;font-size:14px;border:1px solid var(--glass-border);background:rgba(255,255,255,.05);color:var(--muted);cursor:pointer}
.sync-txt{font-size:10px;color:#64748b;white-space:nowrap}

/* ── TOP NAV (pill tabs) ── */
.topnav{display:flex;gap:8px;width:100%;margin-top:2px}
.topnav .nav-pill{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 12px;border-radius:999px;border:1px solid var(--glass-border);background:rgba(255,255,255,.05);color:var(--muted);font-size:12px;font-weight:800;letter-spacing:.03em;cursor:pointer;transition:transform .2s,color .2s,box-shadow .25s;white-space:nowrap}
.topnav .nav-pill .ti{font-size:15px;line-height:1}
.topnav .nav-pill:hover{color:var(--txt)}
.topnav .nav-pill.on{color:#fff;border-color:transparent;box-shadow:0 8px 24px rgba(168,85,247,.35)}
.topnav .nav-pill#nav-collection.on{background:linear-gradient(135deg,var(--c-purple),var(--c-pink))}
.topnav .nav-pill#nav-swaps.on{background:linear-gradient(135deg,var(--c-teal),var(--c-blue))}
.topnav .nav-pill#nav-stats.on{background:linear-gradient(135deg,var(--c-gold),var(--c-orange))}

/* ── TAB VIEWS w/ transition ── */
.tab-view{display:none;opacity:0;transform:translateY(12px);transition:opacity .3s ease,transform .3s ease}
.tab-view.mounted{display:block}
.tab-view.active{opacity:1;transform:translateY(0)}

/* ── EDIT BANNER ── */
.eb{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:16px;margin:12px 14px 0;padding:10px 14px;font-size:12px;color:#fcd34d;line-height:1.6}

/* ── COLLECTION / ALBUM PAGE NAV ── */
.album-topbar{display:flex;align-items:center;gap:10px;padding:12px 14px}
.album-nav{background:rgba(255,255,255,.06);border:1px solid var(--glass-border);color:var(--txt);font-size:18px;padding:6px 13px;border-radius:999px;cursor:pointer;line-height:1;transition:transform .15s,background .2s}
.album-nav:hover{background:rgba(255,255,255,.12);transform:scale(1.08)}
.album-country-label{flex:1;text-align:center;font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.album-progress{height:6px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.album-progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--c-green),var(--c-teal));transition:width .4s}
.album-count{font-size:12px;color:var(--muted);margin-left:8px;white-space:nowrap;font-weight:800}
.album-select{padding:6px 12px;background:rgba(20,8,30,.9);border:1px solid var(--glass-border);border-radius:999px;color:var(--txt);font-size:11px;cursor:pointer;max-width:150px}

/* page slide animation */
.album-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:6px 14px 14px}
@media(min-width:520px){.album-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:820px){.album-grid{grid-template-columns:repeat(4,1fr)}}
.album-grid.slide-left{animation:slideL .35s ease}
.album-grid.slide-right{animation:slideR .35s ease}
@keyframes slideL{from{opacity:0;transform:translateX(36px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(-36px)}to{opacity:1;transform:translateX(0)}}

/* ── ALBUM BOOK SPREAD ── */
.album-book{padding:10px 10px 80px;overflow:hidden}
.book-spread{
  display:flex;gap:0;border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  overflow:hidden;position:relative;
  min-height:380px;
}
.book-left,.book-right{
  padding:18px 14px;position:relative;overflow:hidden;
  transition:background .4s ease;
}
.book-left{flex:0 0 38%;border-right:none}
.book-right{flex:1}
.book-spine{
  width:8px;background:linear-gradient(180deg,rgba(0,0,0,.25),rgba(0,0,0,.05) 50%,rgba(0,0,0,.25));
  flex-shrink:0;position:relative;z-index:2;
  box-shadow:inset -2px 0 4px rgba(0,0,0,.2),inset 2px 0 4px rgba(0,0,0,.2);
}
/* Watermark "2026" on each page */
.book-left::after,.book-right::after{
  content:"2026";position:absolute;
  font-size:140px;font-weight:900;
  color:rgba(255,255,255,.06);
  bottom:-20px;right:-10px;
  pointer-events:none;line-height:1;
  font-style:italic;letter-spacing:-.02em;
}
/* Organic shapes — CSS clip-path blobs */
.page-blob{
  position:absolute;border-radius:60% 40% 55% 45% / 50% 60% 40% 50%;
  pointer-events:none;opacity:.35;
}

/* Left page layout */
.we-are-block{position:relative;z-index:1;margin-bottom:10px}
.we-are-label{font-size:.65rem;font-weight:900;letter-spacing:.14em;color:rgba(255,255,255,.7);text-transform:uppercase}
.we-are-country{font-size:1.5rem;font-weight:900;color:#fff;letter-spacing:.04em;text-shadow:0 2px 8px rgba(0,0,0,.4);line-height:1}
.fed-name{font-size:.6rem;color:rgba(255,255,255,.6);margin-top:4px;line-height:1.3}
.left-stickers{display:flex;flex-direction:column;gap:8px;margin-top:8px;position:relative;z-index:1}

/* Right page: 3-col sticker grid */
.right-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:7px;position:relative;z-index:1;
}
.right-grid .pcard{min-height:100px}

/* Group box inside right grid */
.group-box{
  background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.15);
  border-radius:10px;padding:6px;text-align:center;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  grid-column:2/4;grid-row:3/4;
}
.group-label{font-size:.65rem;font-weight:900;letter-spacing:.08em;color:rgba(255,255,255,.7);text-transform:uppercase}
.group-flags{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:2px}
.group-flags .fi{width:20px;height:14px;border-radius:2px}

/* Slot number watermark inside sticker cards */
.pcard .slot-num{font-size:1.6rem;font-weight:900;color:rgba(255,255,255,.1);position:absolute;top:4px;left:6px;line-height:1;pointer-events:none;z-index:0}

/* Mobile: stack book pages vertically */
@media(max-width:520px){
  .book-spread{flex-direction:column;min-height:auto}
  .book-left{flex:none;border-right:none;border-bottom:1px solid rgba(255,255,255,.1)}
  .book-right{flex:none}
  .book-spine{width:100%;height:6px}
  .left-stickers{flex-direction:row}
}

/* ── MOBILE NAV STRIP ── */
.mobile-nav-strip{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(13,0,21,.92);backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,.1);
  padding:10px 16px;align-items:center;justify-content:space-between;gap:8px;
}
.mnav-btn{
  background:linear-gradient(135deg,var(--c-purple),var(--c-pink));
  border:none;color:#fff;font-size:1rem;font-weight:900;
  padding:12px 24px;border-radius:999px;cursor:pointer;min-width:90px;
  box-shadow:0 4px 15px rgba(168,85,247,.4);
}
.mnav-ctry{font-size:.85rem;font-weight:700;color:var(--muted);text-align:center;flex:1}
@media(max-width:640px){
  .mobile-nav-strip{display:flex}
  .album-book{padding-bottom:90px}
}

/* ── PANINI STICKER CARD ── */
.pcard{position:relative;border-radius:18px;padding:0;overflow:hidden;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);cursor:pointer;transition:transform .2s,box-shadow .25s,border-color .25s;display:flex;flex-direction:column;min-height:128px}
.pcard:hover{transform:translateY(-4px)}
.pcard .stripe{height:5px;width:100%}
.pcard .phead{display:flex;align-items:center;gap:8px;padding:9px 11px 7px}
.pcard .phead .fi{width:22px;height:16px;flex:0 0 auto}
.pcard .pid{font-size:10px;font-weight:900;letter-spacing:.06em;color:var(--muted)}
.pcard .pbody{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:4px 10px 6px}
.pcard .plast{font-weight:900;font-size:16px;line-height:1.05;text-transform:uppercase;letter-spacing:.01em;word-break:break-word}
.pcard .pfirst{font-size:11px;color:var(--muted);margin-top:1px}
.pcard .pfoot{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 10px 9px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.pcard .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.pcard .x2{position:absolute;top:8px;right:8px;background:linear-gradient(135deg,var(--c-blue),#60a5fa);color:#fff;font-size:10px;font-weight:900;padding:2px 8px;border-radius:999px;box-shadow:0 2px 8px rgba(59,130,246,.5)}
.pcard .pcheck{position:absolute;top:8px;right:8px;font-size:14px;color:var(--c-green)}
.pcard .premove{position:absolute;bottom:7px;right:8px;background:rgba(239,68,68,.22);color:var(--c-red);border:none;border-radius:999px;font-size:11px;font-weight:900;cursor:pointer;width:20px;height:20px;display:none;align-items:center;justify-content:center;line-height:1}
.pcard.edit-mode .premove{display:flex}
.pcard .pother{position:absolute;bottom:7px;left:8px;font-size:9px;font-weight:800;padding:2px 7px;border-radius:999px;display:flex;align-items:center;gap:3px}
.po-have{background:rgba(16,185,129,.18);color:#6ee7b7}
.po-double{background:rgba(59,130,246,.2);color:#93c5fd}
.po-missing{background:rgba(239,68,68,.18);color:#fca5a5}

/* status styling */
.pcard.status-missing{opacity:.78;background:rgba(255,255,255,.03)}
.pcard.status-missing .stripe{background:linear-gradient(90deg,var(--c-red),#f87171)}
.pcard.status-missing .dot{background:var(--c-red)}
.pcard.status-have{border-color:rgba(16,185,129,.4)}
.pcard.status-have .stripe{background:linear-gradient(90deg,var(--c-green),#34d399)}
.pcard.status-have .dot{background:var(--c-green)}
.pcard.status-have:hover{box-shadow:0 14px 30px rgba(16,185,129,.25)}
.pcard.status-double{border-color:rgba(59,130,246,.45)}
.pcard.status-double .stripe{background:linear-gradient(90deg,var(--c-blue),#60a5fa)}
.pcard.status-double .dot{background:var(--c-blue)}
.pcard.status-double:hover{box-shadow:0 14px 30px rgba(59,130,246,.3)}
.pcard.is-badge{grid-column:1/-1;flex-direction:row;align-items:center;min-height:auto;background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.35)}
.pcard.is-badge .stripe{display:none}
.pcard.is-badge .shield{font-size:30px;padding:0 6px 0 12px}
.pcard.is-badge .pbody{align-items:flex-start;text-align:left;flex:1;padding:12px 10px}
.pcard.pulse{animation:pulse .3s ease}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}

/* compact sticker cards (left page of book) */
.pcard-sm{min-height:64px;flex:1}
.pcard-sm .phead{padding:6px 8px 4px}
.pcard-sm .pbody{padding:2px 8px 6px}
.left-stickers .pcard-sm.is-badge{min-height:auto;flex:0 0 auto}

/* sticker card first+last name */
.pcard-name{text-align:center}
.pcard .pbody{position:relative;z-index:1}
.pcard-first{display:block;font-size:.6rem;color:rgba(255,255,255,.65);letter-spacing:.06em;text-transform:uppercase;line-height:1.2}
.pcard-last{display:block;font-size:.82rem;font-weight:900;letter-spacing:.01em;line-height:1.1;word-break:break-word}

/* inline name edit form */
.pcard .pedit{position:absolute;bottom:7px;left:8px;background:rgba(168,85,247,.22);color:var(--c-purple);border:none;border-radius:999px;font-size:11px;font-weight:900;cursor:pointer;width:22px;height:22px;display:none;align-items:center;justify-content:center;line-height:1}
.pcard.edit-mode .pedit{display:flex}
.card-edit-form{display:flex;flex-direction:column;gap:5px;padding:8px 10px;background:rgba(0,0,0,.25)}
.card-edit-form input{width:100%;padding:5px 7px;border-radius:8px;border:1px solid var(--glass-border);background:rgba(255,255,255,.08);color:var(--txt);font-size:11px;outline:none}
.card-edit-form .cef-row{display:flex;gap:6px}
.card-edit-form button{flex:1;padding:5px 0;border-radius:8px;border:none;font-size:12px;font-weight:900;cursor:pointer}
.card-edit-form button:first-of-type{background:linear-gradient(135deg,var(--c-teal),var(--c-blue));color:#fff}
.card-edit-form button:last-of-type{background:rgba(255,255,255,.1);color:var(--muted)}

/* ── TEAM VIGNETTE HEADER CARD ── */
.country-vignette{
  display:flex; align-items:center; gap:12px;
  padding:16px 14px; margin:10px 12px; border-radius:18px;
  color:#fff; position:relative; overflow:hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  transition: background 0.4s ease;
}
.country-vignette::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);
  pointer-events:none;
}
.vignette-flag{ font-size:3.5rem; line-height:1; flex-shrink:0; filter:drop-shadow(0 2px 6px rgba(0,0,0,.4)); }
.vignette-body{ flex:1; display:flex; align-items:center; gap:12px; }
.vignette-info{ flex:1; }
.vignette-name{ font-size:1.4rem; font-weight:900; letter-spacing:.04em; text-shadow:0 2px 8px rgba(0,0,0,.4); }
.vignette-sub{ font-size:.75rem; opacity:.8; margin-top:2px; }
.vignette-progress{ text-align:right; }
.vpbar{ height:6px; width:90px; background:rgba(255,255,255,.25); border-radius:3px; overflow:hidden; }
.vpfill{ height:100%; background:#fff; border-radius:3px; transition:width .4s; }
.vplabel{ font-size:.7rem; opacity:.8; margin-top:3px; }
.vnav-btn{ background:rgba(255,255,255,.2); border:none; color:#fff; font-size:1.5rem; width:44px; height:44px; min-width:44px; min-height:44px; padding:0 4px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.vnav-btn:hover{ background:rgba(255,255,255,.35); }

/* ── ACTION BAR ── */
.album-action-bar{display:flex;gap:10px;padding:6px 14px 18px;flex-wrap:wrap}
.abar-btn{flex:1;min-width:90px;padding:10px 14px;border-radius:999px;border:1px solid var(--glass-border);background:rgba(255,255,255,.05);color:var(--txt);font-size:12px;font-weight:800;cursor:pointer;text-align:center;white-space:nowrap;transition:transform .15s,box-shadow .2s}
.abar-btn:hover{transform:translateY(-2px)}
.abar-btn.on{background:linear-gradient(135deg,var(--c-gold),var(--c-orange));color:#1a0a00;border-color:transparent;box-shadow:0 8px 22px rgba(245,158,11,.4)}
.abar-btn.blue{background:linear-gradient(135deg,var(--c-blue),#60a5fa);color:#fff;border-color:transparent}
.abar-btn.teal{background:linear-gradient(135deg,var(--c-teal),var(--c-blue));color:#fff;border-color:transparent}

  for(const s of SEED){ if(nameOverrides[s.id]){ s.first=nameOverrides[s.id].first; s.last=nameOverrides[s.id].last; }}
  for(const s of SEED_BASE){ if(nameOverrides[s.id]){ s.first=nameOverrides[s.id].first; s.last=nameOverrides[s.id].last; }}
}

// Merge SEED_BASE with custom stickers, filter hidden

applyNameOverrides();

// Country page order derived from seed
const COUNTRY_ORDER = (() => {
  const seen={}, list=[];
  for (const s of SEED_BASE){ if(!(s.country in seen)){ seen[s.country]=s.page; list.push(s.country);} }
  list.sort((a,b)=>seen[a]-seen[b]);
  return list;
})();

const showErr = msg => { const e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; setTimeout(()=>e.style.display='none',5000); };
const pairKey = (a,b) => [a,b].sort().join('|');

function statusOf(playerId, sid){
  const ov = statusByPlayer[playerId] || {};
  if (ov[sid]) return ov[sid];
  if (playerId==='p1') return (SEED_BASE.find(x=>x.id===sid)||{}).redha || 'missing';
  if (playerId==='p2') return (SEED_BASE.find(x=>x.id===sid)||{}).mat || 'missing';
  return 'missing';
}

function rebuildSEED(){
  SEED = [...SEED_BASE, ...customStickers].filter(s => !hiddenStickers.has(s.id));
  applyNameOverrides();
}

// ── DATA LOAD ─────────────────────────────────────────────────────────
async function loadAll(){
  if (writing>0) return;
  try {
    const [p, st, dn] = await Promise.all([
      sb.from('players').select('*').order('sort_order'),
      sb.from('sticker_status').select('*'),
      sb.from('swaps_done').select('*')
    ]);
    if (p.error) throw p.error;
    if (st.error) throw st.error;
    if (dn.error) throw dn.error;
    players = p.data;
    statusByPlayer = {};
    for (const row of st.data){
      if (!statusByPlayer[row.player_id]) statusByPlayer[row.player_id] = {};
      statusByPlayer[row.player_id][row.sticker_id] = row.status;
    }
    doneSet = new Set(dn.data.map(r => r.pair_key+'|'+r.sticker_id));
    // Try loading custom sticker defs from Supabase
    try {
      const { data: defs } = await sb.from('sticker_defs').select('*');
      if (defs && defs.length > 0){
        const localIds = new Set(customStickers.map(s=>s.id));
        for (const d of defs){
          if (!localIds.has(d.id) && !SEED_BASE.find(s=>s.id===d.id)){
            customStickers.push({ id:d.id, first:d.first||'', last:d.last||'', club:'', country:d.country||'', flag: (SEED_BASE.find(s=>s.country===d.country)||{}).flag||'', page:d.page||0, redha:'missing', mat:'missing' });
          }
        }
        localStorage.setItem('customStickers', JSON.stringify(customStickers));
        rebuildSEED();
      }
    } catch(_){}
    document.getElementById('sync').textContent = 'synced '+new Date().toLocaleTimeString();
    if (me) render(); else renderSplash();
  } catch(e){
    showErr('Sync error: '+(e.message||e));
    console.error(e);
  }
}

async function setStatus(stickerId, newStatus){
  writing++;
  try {
    if (!statusByPlayer[me]) statusByPlayer[me]={};
    statusByPlayer[me][stickerId] = newStatus;
    render();
    // pulse the changed card
    const card=document.querySelector(`.pcard[data-sid="${stickerId}"]`);
    if (card){ card.classList.remove('pulse'); void card.offsetWidth; card.classList.add('pulse'); }
    const { error } = await sb.from('sticker_status')
      .upsert({ player_id:me, sticker_id:stickerId, status:newStatus, updated_at:new Date().toISOString() });
    if (error) throw error;
    document.getElementById('sync').textContent = 'saved '+new Date().toLocaleTimeString();
  } catch(e){ showErr('Save failed: '+(e.message||e)); }
  finally { writing--; }
}

function cycleStatus(stickerId){
  const cur = statusOf(me, stickerId);
  setStatus(stickerId, cycle[cur] || 'have');
}

// ── SWAP COMPUTATION ──────────────────────────────────────────────────
function swapsForMe(){
  const out=[];
  for (const o of players){
    if (o.id===me) continue;
    for (const s of SEED){
      const mst=statusOf(me,s.id), ost=statusOf(o.id,s.id);
      const pk=pairKey(me,o.id);
      if (doneSet.has(pk+'|'+s.id)) continue;
      if (mst==='missing'&&ost==='double') out.push({...s,other:o,dir:'get'});
      else if (mst==='double'&&ost==='missing') out.push({...s,other:o,dir:'give'});
    }
  }
  out.sort((a,b)=>a.page-b.page);
  return out;
}

// ── VALIDATE SWAP ─────────────────────────────────────────────────────
async function validateSwap(stickerId, otherPlayerId){
  writing++;
  try {
    const pk=pairKey(me,otherPlayerId);
    const { error:e1 }=await sb.from('swaps_done').upsert({pair_key:pk,sticker_id:stickerId});
    if (e1) throw e1;
    doneSet.add(pk+'|'+stickerId);
    const upserts=[
      {player_id:me,sticker_id:stickerId,status:'have',updated_at:new Date().toISOString()},
      {player_id:otherPlayerId,sticker_id:stickerId,status:'have',updated_at:new Date().toISOString()}
    ];
    const { error:e2 }=await sb.from('sticker_status').upsert(upserts);
    if (e2) throw e2;
    if (!statusByPlayer[me]) statusByPlayer[me]={};
    if (!statusByPlayer[otherPlayerId]) statusByPlayer[otherPlayerId]={};
    statusByPlayer[me][stickerId]='have';
    statusByPlayer[otherPlayerId][stickerId]='have';
    render();
    document.getElementById('sync').textContent='traded '+new Date().toLocaleTimeString();
  } catch(e){ showErr('Trade failed: '+(e.message||e)); }
  finally { writing--; }
}

  document.querySelectorAll('.tab-view').forEach(el=>el.classList.remove('active'));
  const target = document.getElementById('tab-'+tab);
  // render content first
  if (tab==='collection') { render(); renderCollPeopleFilter(); renderAlbumTab(); }
  else if (tab==='swaps') { renderSwapPeopleFilter(); renderSwapPanel(); }
  else if (tab==='stats') renderStatsTab();
  // trigger fade+slide in on next frame
  requestAnimationFrame(()=>{ target.classList.add('active'); });
}

// ── RENDER SPLASH ─────────────────────────────────────────────────────
function renderSplash(){
  const root=document.getElementById('splashCards');
  if (players.length===0){ root.innerHTML='<div class="spinner">Loading…</div>'; return; }
  let h='';
  for (const p of players){
    let miss=0,dbl=0,have=0,swaps=0;
    for (const s of SEED){
      const st=statusOf(p.id,s.id);
      if (st==='missing') miss++;
      else have++;
      if (st==='double') dbl++;
    }
    const owned=have+dbl;
    for (const o of players){
      if (o.id===p.id) continue;
      for (const s of SEED){
        const mst=statusOf(p.id,s.id),ost=statusOf(o.id,s.id);
        const pk=pairKey(p.id,o.id);
        if (doneSet.has(pk+'|'+s.id)) continue;
        if ((mst==='missing'&&ost==='double')||(mst==='double'&&ost==='missing')) swaps++;
      }
    }
    h+=`<div class="sp-card" style="border-color:${p.color}55" onclick="pickMe('${p.id}')">
      <div class="av">${p.emoji}</div>
      <div class="pn" style="color:${p.color}">${escapeHtml(p.display_name)}</div>
      <div class="ps"><b style="color:var(--c-green)">${owned}</b> owned · <b style="color:var(--c-blue)">${dbl}</b> doubles<br><b style="color:var(--c-teal)">${swaps}</b> swaps</div>
    </div>`;
  }
  h+=`<div class="sp-add" onclick="openAddPlayerDialog()">
      <div class="av">➕</div>
      <div>Add participant</div>
    </div>`;
  root.innerHTML=h;
}

function pickMe(id){
  me=id;
  collOtherId=null; swapFilterId=null;
  document.getElementById('splash').style.display='none';
  document.getElementById('app').style.display='flex';
  const p=players.find(x=>x.id===id);
  const b=document.getElementById('pbadge');
  b.style.color=p.color; b.style.borderColor=p.color+'66'; b.style.background=p.color+'22';
  b.innerHTML=p.emoji+' '+escapeHtml(p.display_name)+' ▾';
  populateCountrySelect();
  albumCountryIdx=0;
  switchTab('collection');
}

function backSplash(){
  document.getElementById('app').style.display='none';
  document.getElementById('splash').style.display='flex';
  renderSplash();
}

function populateCountrySelect(){
  const asel=document.getElementById('albumCountrySelect');
  asel.innerHTML=COUNTRY_ORDER.map((c,i)=>`<option value="${i}">${i+1}. ${c}</option>`).join('');
}

// Participant filter row in Collection (compare against another person)
function renderCollPeopleFilter(){
  const root=document.getElementById('collPeopleFilter');
  if (!root) return;
  const others=players.filter(p=>p.id!==me);
  if (!others.length){ root.innerHTML=''; return; }
  let h=`<span class="lbl">👤 Others:</span>`;
  h+=`<button class="ppill${collOtherId===null?' on':''}" onclick="setCollOther(null)">None</button>`;
  for (const p of others){
    h+=`<button class="ppill${collOtherId===p.id?' on':''}" onclick="setCollOther('${p.id}')">${p.emoji} ${escapeHtml(p.display_name)}</button>`;

// Participant filter row in Swaps
function renderSwapPeopleFilter(){
  const root=document.getElementById('swapPeopleFilter');
  if (!root) return;
  const others=players.filter(p=>p.id!==me);
  if (!others.length){ root.innerHTML=''; return; }
  let h=`<span class="lbl">Filter:</span>`;
  h+=`<button class="ppill${swapFilterId===null?' on':''}" onclick="setSwapFilter(null)">Everyone</button>`;

    h+=`<button class="ppill${swapFilterId===p.id?' on':''}" onclick="setSwapFilter('${p.id}')">${p.emoji} ${escapeHtml(p.display_name)}</button>`;

// ── RENDER: swap panel ────────────────────────────────────────────────
function renderSwapPanel(){
  let swaps=swapsForMe();
  if (swapFilterId) swaps=swaps.filter(s=>s.other.id===swapFilterId);
  document.getElementById('swaptitle').textContent='↔ Swaps ('+swaps.length+')';

// ── INLINE PLAYER NAME EDITING ────────────────────────────────────────
function openNameEdit(id, btn){
  document.querySelectorAll('.name-edit-panel').forEach(el=>el.remove());
  const s = SEED.find(x=>x.id===id)||{};
  const card = btn ? btn.closest('.pcard') : null;
  const panel = document.createElement('div');
  panel.className = 'name-edit-panel';
  panel.innerHTML = `
    <div class="nep-hdr"><span>✎ ${escapeHtml(id)}</span><button onclick="this.closest('.name-edit-panel').remove()">✕</button></div>
    <input class="edit-first" placeholder="First name" value="${escapeHtml(s.first||'')}">
    <input class="edit-last" placeholder="LAST NAME" value="${escapeHtml(s.last||'')}">
    <div class="nep-btns">
      <button onclick="saveNameEdit('${escapeHtml(id)}',this)">✓ Save</button>
      <button onclick="this.closest('.name-edit-panel').remove()">Cancel</button>
    </div>`;
  panel.addEventListener('click', e=>e.stopPropagation());
  if(card){
    const r=card.getBoundingClientRect();
    panel.style.top=Math.min(r.bottom+6,window.innerHeight-170)+'px';
    panel.style.left=Math.max(6,Math.min(r.left,window.innerWidth-230))+'px';
  } else {
    panel.style.top='50%'; panel.style.left='50%';
    panel.style.transform='translate(-50%,-50%)';
  }
  document.body.appendChild(panel);
  setTimeout(()=>panel.querySelector('.edit-last').focus(),50);
}
function cancelNameEdit(btn){ const f=btn.closest('.card-edit-form')||btn.closest('.name-edit-panel'); if(f)f.remove(); }
async function saveNameEdit(id, btn){
  const panel = btn.closest('.name-edit-panel');
  if(!panel) return;
  const first = panel.querySelector('.edit-first').value.trim();
  const last  = panel.querySelector('.edit-last').value.trim();
  if(!last){ panel.querySelector('.edit-last').style.borderColor='var(--c-red)'; return; }
  const allSeeds = [SEED];
  try{ if(typeof SEED_BASE!=='undefined') allSeeds.push(SEED_BASE); }catch(e){}
  for(const arr of allSeeds){ const s=arr.find(x=>x.id===id); if(s){s.first=first;s.last=last;} }
  nameOverrides[id]={first,last};
  localStorage.setItem('nameOverrides', JSON.stringify(nameOverrides));
  try{ await sb.from('sticker_names').upsert({id,first,last}); }catch(e){}
  panel.remove();
  renderAlbumTab();
}

// other-participant indicator chip for a sticker
function otherChip(sid){
  if (!collOtherId) return '';
  const o=players.find(p=>p.id===collOtherId);
  if (!o) return '';
  const st=statusOf(o.id,sid);
  const lbl=st==='double'?'×2':st==='have'?'✓':'—';
  return `<div class="pother po-${st}" title="${escapeHtml(o.display_name)}">${o.emoji} ${lbl}</div>`;
}

// WC 2026 Groups — derive sequential groups of 3 from COUNTRY_ORDER
function getGroupTeams(country){
  const idx = COUNTRY_ORDER.indexOf(country);
  if (idx < 0) return [];
  const groupIdx = Math.floor(idx / 3);
  const start = groupIdx * 3;
  return COUNTRY_ORDER.slice(start, start+3);
}

function renderAlbumTab(slideDir){
  if(!me) return;
  const ctry = COUNTRY_ORDER[albumCountryIdx];
  if(!ctry) return;
  const stickers = SEED.filter(s=>s.country===ctry);
  const badge = stickers.find(s=>s.id.endsWith('-B'));
  const pl = stickers.filter(s=>!s.id.endsWith('-B')); // 11 players

  const owned = stickers.filter(s=>{const st=statusOf(me,s.id);return st==='have'||st==='double';}).length;
  const missing = stickers.filter(s=>statusOf(me,s.id)==='missing').length;
  const pct = Math.round(100*owned/Math.max(stickers.length,12));

  // Update vignette header
  const iso = isoFlag(ctry)||((stickers[0]||{}).flag||'').toLowerCase();
  const vig=document.getElementById('countryVignette'); if(vig) vig.style.background=countryGradient(ctry);
  const vflag=document.getElementById('vignetteFlag'); if(vflag) vflag.className='fi vignette-flag'+(iso?' fi-'+iso:'');
  const vname=document.getElementById('vignetteName'); if(vname) vname.textContent=ctry.toUpperCase();
  const vsub=document.getElementById('vignetteSub'); if(vsub) vsub.textContent=(albumCountryIdx+1)+' / 48';
  const vfill=document.getElementById('vignetteFill'); if(vfill) vfill.style.width=pct+'%';
  const vlbl=document.getElementById('vignetteLabel'); if(vlbl) vlbl.textContent=owned+'/12 · '+missing+' missing';
  const asel=document.getElementById('albumCountrySelect'); if(asel) asel.value=albumCountryIdx;
  const mctry=document.getElementById('mobileNavCtry'); if(mctry) mctry.textContent=ctry;

  // Page background colors from country gradient
  const grad=countryGradient(ctry);
  const hexes=grad.match(/#[0-9a-fA-F]{6}/g)||['#6366f1','#a855f7'];
  const c1=hexes[0], c2=hexes[hexes.length-1];
  const pageBg=c1+'20', blob1=c1+'50', blob2=c2+'38';

  // Build one sticker card's HTML
  function card(s){
    const st=statusOf(me,s.id);
    const isHave=st==='have', isDbl=st==='double';
    const isBadge=s.id.endsWith('-B');
    const cls='pcard status-'+st+(isBadge?' is-badge':'')+(editMode?' edit-mode':'');
    const num=s.id.split('-')[1]||'';
    if(isBadge) return `<div class="${cls}" data-sid="${s.id}" onclick="cycleStatus('${s.id}')">
      <div class="shield">🛡️</div>
      <div class="pbody"><div style="font-size:10px;opacity:.6">${s.id}</div><div style="font-size:12px;font-weight:900">BADGE</div><div style="font-size:9px;opacity:.5">${escapeHtml(ctry)}</div></div>
      ${isDbl?'<div class="x2">×2</div>':isHave?'<div class="pcheck">✓</div>':''}
    </div>`;
    return `<div class="${cls}" data-sid="${s.id}" onclick="cycleStatus('${s.id}')">
      <div class="stripe"></div>
      <div class="phead">${flagSpan(s.country,s.flag)}<span class="pid">${s.id}</span></div>
      <div class="pbody" style="position:relative">
        <div style="position:absolute;top:2px;left:4px;font-size:1.5rem;font-weight:900;color:rgba(255,255,255,.07);line-height:1;pointer-events:none;z-index:0">${num}</div>
        <div class="pcard-name" style="position:relative;z-index:1">
          ${s.first?`<span class="pcard-first">${escapeHtml(s.first)}</span>`:''}
          <span class="pcard-last">${escapeHtml(s.last)}</span>
        </div>
      </div>
      <div class="pfoot"><span class="dot"></span>${escapeHtml(s.country)}</div>
      ${isDbl?'<div class="x2">×2</div>':isHave?'<div class="pcheck">✓</div>':''}
      ${otherChip(s.id)}
      ${editMode?`<button class="premove" onclick="event.stopPropagation();hideSticker('${s.id}')">✕</button>`:''}
      ${editMode?`<button class="pedit" onclick="event.stopPropagation();openNameEdit('${s.id}',this)">✎</button>`:''}
    </div>`;
  }

  // Group info box
  const groupTeams=getGroupTeams(ctry);
  const groupHtml=`<div class="group-info">
    <div class="gi-label">GROUP</div>
    <div class="gi-flags">${groupTeams.map(t=>`<span class="fi fi-${isoFlag(t)||'un'}" title="${escapeHtml(t)}" style="width:22px;height:15px;border-radius:2px;display:inline-block;margin:1px"></span>`).join('')}</div>
  </div>`;

  // LEFT PAGE: WE ARE block + badge + P1 + P2
  const leftP=pl.slice(0,2);
  const leftHtml=`
    <div class="page-blob" style="width:110px;height:110px;background:${blob1};top:-25px;right:-18px;opacity:.5"></div>
    <div class="page-blob" style="width:75px;height:75px;background:${blob2};bottom:55px;left:-12px;opacity:.4"></div>
    <div class="we-are-block">
      <div class="we-are-label">WE ARE</div>
      <div class="we-are-name">${escapeHtml(ctry.toUpperCase())}</div>
      <div class="we-are-fed">${escapeHtml(ctry)} National Team</div>
    </div>
    <div class="left-stickers">
      ${badge?card(badge):''}
      ${leftP.map(s=>card(s)).join('')}
    </div>`;

  // RIGHT PAGE: P3–P11 (9 players) in 3×3 + group box absolute overlay
  const rightP=pl.slice(2);
  const rightHtml=`
    <div class="page-blob" style="width:150px;height:150px;background:${blob1};bottom:-35px;right:-25px;opacity:.4"></div>
    <div class="right-grid">
      ${rightP.map(s=>card(s)).join('')}
    </div>
    ${groupHtml}`;

  // Apply to DOM with slide animation
  const bookLeft=document.getElementById('bookLeft');
  const bookRight=document.getElementById('bookRight');
  const spread=document.getElementById('bookSpread');
  if(!bookLeft||!bookRight||!spread) return;

  function applyContent(){
    bookLeft.style.background=pageBg;
    bookRight.style.background=pageBg;
    bookLeft.innerHTML=leftHtml;
    bookRight.innerHTML=rightHtml;
  }

  if(slideDir){
    spread.style.transition='opacity .2s,transform .2s';
    spread.style.opacity='0';
    spread.style.transform=slideDir==='left'?'translateX(28px)':'translateX(-28px)';
    setTimeout(()=>{
      applyContent();
      spread.style.transition='none';
      spread.style.transform=slideDir==='left'?'translateX(-20px)':'translateX(20px)';
      spread.style.opacity='0';
      requestAnimationFrame(()=>{
        spread.style.transition='opacity .25s,transform .25s';
        spread.style.transform='translateX(0)';
        spread.style.opacity='1';
      });
    },200);
  } else {
    applyContent();
    spread.style.transition='';
    spread.style.opacity='1';
    spread.style.transform='translateX(0)';
  }

  const editBtn=document.getElementById('albumEditBtn');
  if(editBtn){editBtn.className='abar-btn'+(editMode?' on':'');editBtn.textContent=editMode?'✓ Done':'✎ Edit';}
}

// ── RENDER: stats tab ─────────────────────────────────────────────────
function renderStatsTab(){
  if (!me) return;
  let totalMiss=0,totalDbl=0,totalHave=0;
  for (const s of SEED){
    const m=statusOf(me,s.id);
    if (m==='missing') totalMiss++;
    else totalHave++;
    if (m==='double') totalDbl++;
  }
  const totalOwned=totalHave+totalDbl;
  const totalAll=SEED.length;
  const pct=totalAll?Math.round(100*totalOwned/totalAll):0;
  const swapCnt=swapsForMe().length;

  // Per-country stats — denominator hard-coded to 12 (max per country)
  const CMAX = 12;
  const countryStats=[];
  for (const c of COUNTRY_ORDER){
    const arr=SEED.filter(s=>s.country===c);
    if (!arr.length) continue;
    let own=0,dbl=0,miss=0;
    for (const s of arr){
      const m=statusOf(me,s.id);
      if (m==='missing') miss++;
      else own++;
      if (m==='double') dbl++;
    }
    const ownedC=own+dbl;
    const pctC=Math.round(100*ownedC/CMAX);
    countryStats.push({c, arr, own:ownedC, miss, total:CMAX, pctC, flag:flagSpan(c,(arr[0]||{}).flag||'')});
  }
  if (statsSortMode==='missing') countryStats.sort((a,b)=>b.miss-a.miss || b.pctC-a.pctC);
  else countryStats.sort((a,b)=>b.pctC-a.pctC);

  let rowsH='';
  for (const {c,own,miss,total,pctC,flag} of countryStats){
    const col=pctC>75?'var(--c-green)':pctC>40?'var(--c-gold)':'var(--c-red)';
    rowsH+=`<div class="stats-row">
      <div class="sr-flag">${flag}</div>
      <div class="sr-name">${escapeHtml(c)}</div>
      <div class="sr-bar"><div class="sr-fill" style="width:${Math.min(pctC,100)}%;background:${col}"></div></div>
      <div class="sr-meta">${own} / ${total} · <span style="color:var(--c-red)">${miss} miss</span></div>
      <div class="sr-pct" style="color:${col}">${pctC}%</div>
    </div>`;
  }

  // Donut chart (conic-gradient: owned green, missing faint)
  const donut=`<div class="donut-wrap">
      <div class="donut" style="border-radius:50%;background:conic-gradient(var(--c-green) 0% ${pct}%, rgba(255,255,255,0.07) ${pct}% 100%)">
        <div style="position:absolute;inset:14px;border-radius:50%;background:#150022"></div>
        <div class="dlabel"><div class="dp">${pct}%</div><div class="ds">Complete</div></div>
      </div>
      <div style="flex:1;min-width:160px">
        <div style="font-weight:900;font-size:14px;margin-bottom:8px">Overall Collection</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.8">
          <div><b style="color:var(--c-green)">${totalOwned}</b> owned of <b>${totalAll}</b> stickers</div>
          <div><b style="color:var(--c-blue)">${totalDbl}</b> doubles · <b style="color:var(--c-red)">${totalMiss}</b> missing</div>
          <div><b style="color:var(--c-teal)">${swapCnt}</b> swappable now</div>
        </div>
      </div>
    </div>`;

  document.getElementById('statsInner').innerHTML=`
    <div class="stats-hero">
      <div class="stat-card"><div class="sv" style="color:var(--c-green)">${totalOwned}</div><div class="sl">Owned</div></div>
      <div class="stat-card"><div class="sv" style="color:var(--c-blue)">${totalDbl}</div><div class="sl">Doubles</div></div>
      <div class="stat-card"><div class="sv" style="color:var(--c-red)">${totalMiss}</div><div class="sl">Missing</div></div>
      <div class="stat-card"><div class="sv" style="color:var(--c-teal)">${swapCnt}</div><div class="sl">Swappable</div></div>
    </div>
    ${donut}
    <div class="stats-country-list">
      <h4 class="stats-country-head">By Country
        <button class="stats-sort-btn" onclick="toggleStatsSort()">Sort: ${statsSortMode==='missing'?'Most missing':'Most complete'}</button>
      </h4>
      ${rowsH}
    </div>`;
}

  h+='<button onclick="resetDoneSwaps()" style="padding:8px 14px;background:#ef444433;color:var(--red);border:1px solid var(--red);border-radius:5px;cursor:pointer;font-size:12px;margin-right:8px">Reset traded-swaps history</button>';
  h+='<button onclick="resetAllStatus()" style="padding:8px 14px;background:#ef444433;color:var(--red);border:1px solid var(--red);border-radius:5px;cursor:pointer;font-size:12px">Reset ALL player data</button>';
  h+='<p style="margin-top:24px;font-size:11px;color:#475569"><a href="./" style="color:var(--teal)">← back to app</a></p>';
  root.innerHTML=h;
}
async function savePlayer(id){
  const nm=document.getElementById('nm_'+id).value.trim();
  const em=document.getElementById('em_'+id).value.trim()||'⚪';
  const {error}=await sb.from('players').update({display_name:nm,emoji:em}).eq('id',id);
  if (error) alert('Save failed: '+error.message); else alert('Saved.');
}
async function resetDoneSwaps(){
  if (!confirm('Clear ALL traded-swap history?')) return;
  const {error}=await sb.from('swaps_done').delete().neq('pair_key','');
  if (error) alert('Failed: '+error.message); else alert('Cleared.');
}
async function resetAllStatus(){
  if (!confirm('WIPE every player\'s sticker data? Cannot be undone.')) return;
  if (!confirm('Really? This deletes everyone\'s collection state.')) return;
  const {error}=await sb.from('sticker_status').delete().neq('player_id','');
  if (error) alert('Failed: '+error.message); else alert('Wiped.');
}
async function removeParticipant(id, name){
  if (!confirm('Remove participant "'+name+'"? This deletes them and all their sticker data.')) return;
  try {
    // delete their sticker status rows, then the player row
    const r1=await sb.from('sticker_status').delete().eq('player_id', id);
    if (r1.error) throw r1.error;
    const r2=await sb.from('players').delete().eq('id', id);
    if (r2.error) throw r2.error;
    alert('Removed "'+name+'".');
    loadAdmin();
  } catch(e){ alert('Remove failed: '+(e.message||e)); }
}

// ── UPLOAD / AI EXTRACTION ────────────────────────────────────────────
let uploadMode=null, lastExtraction=null, overrideOldDoubles=[];

function openUpload(mode){
  uploadMode=mode;
  const titles={album:'📷 Scan album page',batch:'📥 Upload new batch','override-doubles':'🔄 Update my doubles'};
  const descs={
    album:'Photo of an album page — detects which slots are filled or empty.',
    batch:'⭐ Pink star = newly acquired (missing → have) · No star = duplicate (double). Select one or more photos.',
    'override-doubles':'Select photos of ALL your current doubles. This will fully replace your doubles list.'
  };
  document.getElementById('uploadTitle').textContent=titles[mode];
  document.getElementById('uploadDesc').textContent=descs[mode];
  document.getElementById('detectedCountry').style.display='none';
  document.getElementById('uploadStatus').textContent='';
  document.getElementById('uploadResults').style.display='none';
  document.getElementById('uploadThumbs').innerHTML='';
  document.getElementById('uploadFile').value='';
  document.getElementById('uploadFile').multiple=(mode!=='album');
  lastExtraction=null; overrideOldDoubles=[];
  document.getElementById('uploadModal').style.display='flex';
}
function closeUpload(){ document.getElementById('uploadModal').style.display='none'; }

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve({base64:reader.result.split(',')[1],mimeType:file.type||'image/jpeg',dataUrl:reader.result});
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

async function resizeImage(file){
  const {dataUrl}=await fileToBase64(file);
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=1600;
      let w=img.width,h=img.height;
      if (w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const jpeg=canvas.toDataURL('image/jpeg',.85);
      resolve({base64:jpeg.split(',')[1],mimeType:'image/jpeg',dataUrl:jpeg});
    };
    img.src=dataUrl;
  });
}

async function callExtract(prepared,apiMode){
  const resp=await fetch('/api/extract',{
    method:'POST',
    headers:{'content-type':'application/json'},
    body:JSON.stringify({mode:apiMode,imageBase64:prepared.base64,mimeType:prepared.mimeType})
  });
  if (!resp.ok){
    let d=''; try{const j=await resp.json();d=j.error+(j.detail?': '+j.detail:'');}catch(_){d=await resp.text();}
    throw new Error(d||'Server error');
  }
  return resp.json();
}

function normalize(s){ return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9]/g,' ').replace(/\s+/g,' ').trim(); }

function editDistance(a,b){
  const m=a.length,n=b.length,dp=[];
  for(let i=0;i<=m;i++){dp[i]=[];for(let j=0;j<=n;j++)dp[i][j]=i===0?j:j===0?i:0;}
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function matchSticker(country,last,first){
  if (!country||!last) return null;
  const normLast=normalize(last);
  if (normLast==='BADGE') return SEED.find(s=>s.country===country&&s.last==='BADGE')||null;
  const pool=SEED.filter(s=>s.country===country);
  if (!pool.length) return null;
  let m=pool.find(s=>normalize(s.last)===normLast);
  if (m) return {...m,fuzzy:false};
  const normFirst=normalize(first||'');
  if (normFirst){
    m=pool.find(s=>normalize(s.last)===normFirst)||
      pool.find(s=>normalize(s.first||'')===normLast||normalize(s.first||'')===normFirst);
    if (m) return {...m,fuzzy:false};
  }
  let best=null,bestDist=Infinity;
  const query2=normFirst?normLast+' '+normFirst:normLast;
  for (const s of pool){
    const d=Math.min(editDistance(normLast,normalize(s.last)),editDistance(query2,normalize(s.last)+' '+normalize(s.first||'')));
    if (d<bestDist){bestDist=d;best=s;}
  }
  const threshold=Math.max(2,Math.floor(normLast.length*0.4));
  if (best&&bestDist<=threshold) return {...best,fuzzy:true};
  return null;
}

async function onFilesPicked(event){
  const files=Array.from(event.target.files);
  if (!files.length) return;
  const status=document.getElementById('uploadStatus');
  const thumbs=document.getElementById('uploadThumbs');
  document.getElementById('uploadResults').style.display='none';
  thumbs.innerHTML='';
  for (const file of files){
    const url=URL.createObjectURL(file);
    const img=document.createElement('img');
    img.src=url;
    img.style.cssText='height:56px;border-radius:5px;object-fit:cover;border:1px solid var(--bdr)';
    thumbs.appendChild(img);
  }
  const apiMode=uploadMode==='album'?'album':'doubles';
  const allResults=[];
  let errors=0;
  for (let i=0;i<files.length;i++){
    status.textContent=files.length>1?`⏳ Processing photo ${i+1} of ${files.length}…`:'⏳ Sending to AI… 5–15 seconds';
    let prepared;
    try{prepared=await resizeImage(files[i]);}catch(e){errors++;continue;}
    let result;
    try{result=await callExtract(prepared,apiMode);}catch(e){errors++;status.textContent=`✗ Photo ${i+1}: ${e.message}`;continue;}
    if (result.stickers&&result.stickers.length>0) allResults.push(result);
  }
  if (allResults.length===0){
    status.textContent=`✗ Nothing detected.${errors?' Some photos failed — try clearer images.':' Try a clearer photo.'}`;
    return;
  }
  const total=allResults.reduce((n,r)=>n+r.stickers.length,0);
  status.textContent=`✓ Detected ${total} sticker(s) across ${allResults.length} photo(s).${errors?' ('+errors+' failed)':''} Review and apply:`;
  if (uploadMode==='album'){
    const r=allResults[0];
    if (r.country){
      document.getElementById('detectedCountryName').innerHTML=flagSpan(r.country,(SEED.find(s=>s.country===r.country)||{}).flag||'')+' '+escapeHtml(r.country);
      document.getElementById('detectedCountry').style.display='block';
    }
    renderAlbumResults(r);
  } else if (uploadMode==='batch'){
    renderBatchResults(allResults);
  } else {
    renderOverrideResults(allResults);
  }
}

function renderAlbumResults(result){
  const ctry=result.country;
  const bySlot={};
  for (const s of SEED.filter(s=>s.country===ctry)) bySlot[s.id.split('-')[1]]=s;
  const resolved=result.stickers.map(row=>{
    const match=bySlot[String(row.slot)];
    return {sid:match?match.id:null,status:row.status,label:match?`${match.id} ${match.last||'BADGE'}`:`slot ${row.slot} (not in DB)`,matched:!!match,checked:!!match,warn:null};
  });
  lastExtraction=resolved;
  renderResolvedList(resolved);
}

function renderBatchResults(allResults){
  const byId={},unmatched=[];
  for (const result of allResults){
    for (const row of result.stickers){
      const last=(row.last||'').toUpperCase();
      const match=matchSticker(row.country,last,row.first);
      if (match){
        if (!byId[match.id]||row.status==='have') byId[match.id]={match,status:row.status};
      } else {
        const key=`${row.country}|${last}`;
        if (!unmatched.find(u=>u.key===key)) unmatched.push({key,country:row.country,last});
      }
    }
  }
  const resolved=[];
  for (const {match,status} of Object.values(byId)){
    const cur=statusOf(me,match.id);
    let warn=null;
    if (status==='have'&&cur!=='missing') warn=cur==='have'?'already have — check':'not in missing list';
    if (status==='double'&&cur==='double') warn='already in doubles — confirm';
    resolved.push({sid:match.id,status,label:`${match.id} ${match.last}${match.first?' ('+match.first+')':''} · ${match.country}`,matched:true,checked:!warn,warn,fuzzy:!!match.fuzzy});
  }
  for (const u of unmatched) resolved.push({sid:null,status:'double',label:`${u.country||'?'} ${u.last||'?'} — no match`,matched:false,checked:false,warn:null});
  resolved.sort((a,b)=>{
    if (!a.matched&&b.matched) return 1; if (a.matched&&!b.matched) return -1;
    if (a.status!==b.status) return a.status==='have'?-1:1;
    return a.label.localeCompare(b.label);
  });
  lastExtraction=resolved;
  renderResolvedList(resolved);
}

function renderOverrideResults(allResults){
  const byId={},unmatched=[];
  for (const result of allResults){
    for (const row of result.stickers){
      const last=(row.last||'').toUpperCase();
      const match=matchSticker(row.country,last,row.first);
      if (match){if(!byId[match.id])byId[match.id]=match;}
      else{const key=`${row.country}|${last}`;if(!unmatched.find(u=>u.key===key))unmatched.push({key,country:row.country,last});}
    }
  }
  const newDoubleIds=new Set(Object.keys(byId));
  overrideOldDoubles=SEED.filter(s=>statusOf(me,s.id)==='double'&&!newDoubleIds.has(s.id));
  const resolved=[];
  for (const match of Object.values(byId))
    resolved.push({sid:match.id,status:'double',label:`${match.id} ${match.last}${match.first?' ('+match.first+')':''} · ${match.country}`,matched:true,checked:true,warn:null,fuzzy:!!match.fuzzy});
  for (const u of unmatched)
    resolved.push({sid:null,status:'double',label:`${u.country||'?'} ${u.last||'?'} — no match`,matched:false,checked:false,warn:null});
  resolved.sort((a,b)=>a.label.localeCompare(b.label));
  lastExtraction=resolved;
  const list=document.getElementById('uploadResultsList');
  if (overrideOldDoubles.length>0){
    const names=escapeHtml(overrideOldDoubles.slice(0,6).map(s=>s.last).join(', ')+(overrideOldDoubles.length>6?'…':''));
    list.innerHTML=`<div style="margin-bottom:8px;padding:8px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px;font-size:11px;color:var(--red)">⚠ <b>${overrideOldDoubles.length}</b> sticker(s) currently in your doubles list were NOT detected and will be moved back to <b>have</b>: ${names}</div>`;
  } else { list.innerHTML=''; }
  renderResolvedList(resolved,true);
}

function renderResolvedList(resolved,append=false){
  document.getElementById('uploadResultsHeader').textContent=uploadMode==='override-doubles'
    ?`Detected ${resolved.filter(r=>r.matched).length} doubles — uncheck any that don't belong:`
    :`Review ${resolved.length} detected stickers — uncheck to skip:`;
  let h='';
  resolved.forEach((r,i)=>{
    const badgeCls=r.warn?'b-warn':(r.matched?'b-'+r.status:'b-unmatched');
    const statusLabel=r.status==='have'?'⭐ HAVE':r.status.toUpperCase();
    const warnChip=r.warn?`<span class="warn-chip">⚠ ${escapeHtml(r.warn)}</span>`:'';
    const fuzzyChip=r.fuzzy?`<span class="fuzzy-chip">~ close match</span>`:'';
    h+=`<div class="urow${r.warn?' urow-warn':''}">
      <input type="checkbox" id="urow_${i}" ${r.checked?'checked':''} ${r.matched?'':'disabled'} onchange="lastExtraction[${i}].checked=this.checked">
      <span class="badge ${badgeCls}">${statusLabel}</span>
      <span style="flex:1;color:${r.matched?'var(--txt)':'var(--muted)'}">${escapeHtml(r.label)}${warnChip}${fuzzyChip}</span>
    </div>`;
  });
  const list=document.getElementById('uploadResultsList');
  if (append) list.innerHTML+=h; else list.innerHTML=h;
  document.getElementById('uploadResults').style.display='block';
}

async function applyExtraction(){
  if (!lastExtraction) return;
  const toApply=lastExtraction.filter(r=>r.checked&&r.matched);
  if (toApply.length===0&&overrideOldDoubles.length===0){alert('Nothing to apply.');return;}
  const btn=document.getElementById('applyBtn');
  btn.disabled=true; btn.textContent='⏳ Applying…';
  writing++;
  try {
    const now=new Date().toISOString();
    let allRows;
    if (uploadMode==='override-doubles'){
      const setDouble=toApply.map(r=>({player_id:me,sticker_id:r.sid,status:'double',updated_at:now}));
      const demote=overrideOldDoubles.map(s=>({player_id:me,sticker_id:s.id,status:'have',updated_at:now}));
      allRows=[...setDouble,...demote];
    } else {
      allRows=toApply.map(r=>({player_id:me,sticker_id:r.sid,status:r.status,updated_at:now}));
    }
    const {error}=await sb.from('sticker_status').upsert(allRows);
    if (error) throw error;
    if (!statusByPlayer[me]) statusByPlayer[me]={};
    for (const r of allRows) statusByPlayer[me][r.sticker_id]=r.status;
    render();
    closeUpload();
    const msg=uploadMode==='override-doubles'
      ?`✓ Doubles updated: ${toApply.length} set as double, ${overrideOldDoubles.length} moved to have`
      :`✓ Applied ${toApply.length} updates`;
    showErr(msg);
  } catch(e){
    showErr('Apply failed: '+(e.message||e));
  } finally {
    writing--;
    btn.disabled=false; btn.textContent='✓ Apply';
  }
}
